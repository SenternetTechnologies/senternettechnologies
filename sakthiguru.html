<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakthi Guru | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }

        /* Creative White Intro Styles */
        #intro-wrapper {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .dot-pulse {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: startMorph 3s infinite cubic-bezier(0.19, 1, 0.22, 1);
        }

        .reveal-box {
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            animation: contentShow 1.5s forwards 1.2s;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 8px;
        }

        .main-title span {
            color: var(--primary);
        }

        .sub-tag {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes startMorph {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(40); opacity: 1; background: #f8fafc; }
            60% { transform: scale(100); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        @keyframes contentShow {
            to { opacity: 1; transform: scale(1); }
        }

        /* Iframe transition */
        #portal-frame {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .zoom-out {
            transform: scale(1.5);
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Loading Indicator in Intro */
        .loading-line {
            width: 40px;
            height: 2px;
            background: #e2e8f0;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .loading-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            animation: lineAnim 2s infinite;
        }
        @keyframes lineAnim {
            to { left: 100%; }
        }
    </style>
</head>
<body>

    <!-- Trending White Intro Layer -->
    <div id="intro-wrapper">
        <div class="dot-pulse"></div>
        
        <div class="reveal-box">
            <h1 class="main-title">Sakthi<span>Guru</span></h1>
            <p class="sub-tag">Enlightening Education</p>
            <div class="loading-line"></div>
            
            <!-- Senternet Branding -->
            <div class="mt-12 flex items-center justify-center gap-2 opacity-60">
                <img src="https://www.jotform.com/uploads/senternettechnologies/agent_files/avatar_images/1000009224-6944f3cfaee596.07540393.webp" 
                     alt="Senthilkumar CEO" class="w-6 h-6 rounded-full grayscale">
                <p class="text-[10px] font-bold tracking-widest text-slate-400">
                    CRAFTED BY <a href="https://rebrand.ly/senternet" class="text-blue-600 hover:underline">SENTERNET</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Website Content -->
    <iframe 
        id="portal-frame" 
        src="https://script.google.com/macros/s/AKfycbzuag_eo9EH7mqDrcrl2h3eoLOKXvgQGhOpDqVRm5DB8t6x3f26eU2KGSwgCEItEVwF/exec" 
        allow="camera; microphone; geolocation"
        loading="lazy">
    </iframe>

    <script>
        window.addEventListener('load', () => {
            const intro = document.getElementById('intro-wrapper');
            const frame = document.getElementById('portal-frame');

            // 3.5 seconds for the creative reveal
            setTimeout(() => {
                intro.classList.add('zoom-out');
                frame.style.opacity = '1';
                
                // Remove from DOM after transition to save memory
                setTimeout(() => {
                    intro.style.display = 'none';
                }, 1000);
            }, 3500);
        });
    </script>
</body>
</html>
